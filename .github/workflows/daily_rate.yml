name: 每日汇率监控

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  send-exchange-rate:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v3

    - name: 设置Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install requests==2.31.0

    - name: 运行汇率监控
      run: python main.py

    - name: 显示执行状态
      if: always()
      run: echo "汇率监控任务执行完成"
