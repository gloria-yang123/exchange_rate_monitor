name: 每日汇率监控

# 触发条件
on:
  schedule:
    # 每天北京时间上午9:00执行（UTC时间1:00，因为北京时间=UTC+8）
    - cron: '0 1 * * *'

  # 允许手动触发（用于测试）
  workflow_dispatch:

jobs:
  send-exchange-rate:
    runs-on: ubuntu-latest

    steps:
    # 1. 检出代码
    - name: 检出代码
      uses: actions/checkout@v3

    # 2. 设置Python环境
    - name: 设置Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    # 3. 安装依赖
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install requests==2.31.0

    # 4. 运行汇率监控程序
    - name: 运行汇率监控
      run: python main.py

    # 5. 显示执行结果（可选）
    - name: 显示执行状态
      if: always()
      run: echo "汇率监控任务执行完成"
